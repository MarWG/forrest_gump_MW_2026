<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto    </title>
    <link rel="icon" href="media/imagenes/favicon.png">
            <link rel="stylesheet" href="css/styles.css">

</head>
<body>
<!-- contacto.html -->
<main>
    <section>
        <h2>Contacto</h2>

        <article>
            <h3>Comentarios y Consultas</h3>
            <p>¿Tenés comentarios sobre la película? Nos encantaría conocer tu opinión.</p>

            <form action="confirmacion.html" method="get">
                <div>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required autocomplete="off">
                </div>

                <div>
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" required autocomplete="off">
                </div>

                <div>
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" required placeholder="nombre@email.com">
                </div>

                <div>
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" required></textarea>
                </div>

                <input type="submit" value="Enviar mensaje">
            </form>
        </article>
    </section>
</main>







</body>
</html>
